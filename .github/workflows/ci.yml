name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.changed_files.*.filename, ' '), 'app/') ||
      contains(join(github.event.pull_request.changed_files.*.filename, ' '), 'tests/') ||
      contains(join(github.event.pull_request.changed_files.*.filename, ' '), 'pyproject.toml')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" ruff

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ --tb=short -q

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.changed_files.*.filename, ' '), 'dashboard/')

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
